# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  repro-cran:
    name: Reproduce CRAN Segfault (Fedora Rawhide + ASAN + GCTorture)
    runs-on: ubuntu-latest
    container: fedora:rawhide
    env:
      CC: "clang"
      CXX: "clang++"
      # Aggressive flags to match CRAN and expose subtle memory/alignment issues
      # Using -fno-strict-aliasing for type-punning safety in integer64.c
      CFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g -O3 -fno-strict-aliasing -fstack-protector-all -U_FORTIFY_SOURCE"
      CXXFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g -O3 -fno-strict-aliasing -fstack-protector-all -stdlib=libc++ -U_FORTIFY_SOURCE"
      LDFLAGS: "-fsanitize=address,undefined -stdlib=libc++"
      ASAN_OPTIONS: "detect_leaks=0:detect_odr_violation=0:halt_on_error=1:strict_string_checks=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          dnf install -y R-core-devel clang libcxx-devel libuv-devel libcurl-devel openssl-devel procps-ng

      - name: Install Dependencies from Source
        run: |
          # Force source installation to ensure dependencies are compiled with the same sanitizers
          Rscript -e 'install.packages(c("remotes", "testthat", "patrick", "bit"), repos="https://cloud.r-project.org", type="source")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, type="source")'

      - name: Install bit64
        run: R CMD INSTALL .

      - name: Run Tests with GCTorture
        run: |
          # Use gctorture2 to force GC frequently, exposing dangling pointers in C code
          # This is the most likely way to reproduce a segfault that ASAN misses
          Rscript -e 'gctorture2(10); library(patrick); testthat::test_local()'

  test-ancient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '3.5.0'


      - name: Install bit64 and dependencies
        run: |
          Rscript -e 'options(repos = "https://cloud.r-project.org");  install.packages("bit")'
          R CMD INSTALL .
          cp .devcontainer/r-350/.Rprofile .

      - name: Run Tests
        shell: bash
        run: |
          EXIT_CODE=0
          for FILE in tests/testthat/test-*.R; do
            echo "----------------------------------------------------------------"
            echo "Running $FILE"

            sed -E "s/(patrick|withr):://g" "$FILE" > "${FILE}_SHIMMED.R"
            Rscript -e "library(methods); suppressWarnings(suppressMessages(library(bit64))); source('tests/testthat/helper.R'); source('${FILE}_SHIMMED.R')"
            rm "${FILE}_SHIMMED.R"

            # Capture failure
            if [ $? -ne 0 ]; then
              EXIT_CODE=1
            fi

          done

          exit $EXIT_CODE
