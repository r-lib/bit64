# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  strict-clang:
    name: "Strict Clang (Clang + Opt + Hardening)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libuv1-dev clang

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Build and Check
        env:
          CC: clang
          CXX: clang++
          # Strict compiler configuration:
          # -O3: High optimization level
          # -DNDEBUG: Disable assertions for performance
          # -Wall -Wextra -Werror: Enforce clean code via strict warnings
          # -fno-omit-frame-pointer: Enable better profiling/debugging
          # -fstack-protector: Enable stack overflow protection
          # -D_FORTIFY_SOURCE=2: Enable additional buffer overflow checks
          CFLAGS: "-O3 -DNDEBUG -Wall -Wextra -Werror -Wno-unused-parameter -Wno-missing-field-initializers -fno-omit-frame-pointer -fstack-protector -D_FORTIFY_SOURCE=2"
          CXXFLAGS: "-O3 -DNDEBUG -Wall -Wextra -Werror -Wno-unused-parameter -Wno-missing-field-initializers -fno-omit-frame-pointer -fstack-protector -D_FORTIFY_SOURCE=2"
        run: |
          Rscript -e 'library(patrick); testthat::test_local()'

  gcc-ASAN:
    name: "Oxford gcc-ASAN"
    runs-on: ubuntu-latest
    container:
      image: rocker/r-devel-san
    env:
      ASAN_OPTIONS: 'detect_leaks=0:halt_on_error=1'
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
      R_DONT_USE_TK: true
      RGL_USE_NULL: true
      RJAVA_JVM_STACK_WORKAROUND: 0
      # Oxford flags
      CC: "gcc -fsanitize=address,undefined,bounds-strict -fno-omit-frame-pointer"
      CXX: "g++ -fsanitize=address,undefined,bounds-strict -fno-omit-frame-pointer"
      CFLAGS: "-g -O2 -Wall -pedantic -mtune=native -fsanitize=address,undefined,bounds-strict -fno-omit-frame-pointer -Wno-stringop-truncation -Wno-alloc-size-larger-than"
      CXXFLAGS: "-g -O2 -Wall -pedantic -mtune=native -fsanitize=address,undefined,bounds-strict -fno-omit-frame-pointer -Wno-ignored-attributes -Wno-deprecated-declarations -Wno-stringop-truncation -Wno-alloc-size-larger-than"
      FC: gfortran
      FFLAGS: "-g -O2 -mtune=native"
      MAIN_LDFLAGS: "-fsanitize=address,undefined -pthread"
      # LTO flags
      AR: gcc-ar
      RANLIB: gcc-ranlib
      LTO: "-flto=10"
      LTO_OPT: "-flto"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y libuv1-dev
      - name: Install dependencies from source
        run: |
          mkdir -p ~/.R
          echo "CC=$CC" >> ~/.R/Makevars
          echo "CXX=$CXX" >> ~/.R/Makevars
          echo "CFLAGS=$CFLAGS" >> ~/.R/Makevars
          echo "CXXFLAGS=$CXXFLAGS" >> ~/.R/Makevars
          echo "FC=$FC" >> ~/.R/Makevars
          echo "FFLAGS=$FFLAGS" >> ~/.R/Makevars
          echo "MAIN_LDFLAGS=$MAIN_LDFLAGS" >> ~/.R/Makevars
          echo "AR=$AR" >> ~/.R/Makevars
          echo "RANLIB=$RANLIB" >> ~/.R/Makevars
          Rscript -e 'install.packages("remotes", repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, type = "source")'
      - name: Build and Check
        run: |
          R CMD build .
          R CMD check bit64_*.tar.gz --as-cran --no-manual --no-vignettes

  clang-ASAN:
    name: "Oxford clang-ASAN"
    runs-on: ubuntu-latest
    container:
      image: rocker/r-devel-ubsan-clang
    env:
      ASAN_OPTIONS: 'detect_leaks=0:detect_odr_violation=0:halt_on_error=1'
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
      R_DONT_USE_TK: true
      RGL_USE_NULL: true
      RJAVA_JVM_STACK_WORKAROUND: 0
      # Oxford flags
      CC: "clang -fsanitize=address,undefined -fno-omit-frame-pointer"
      CXX: "clang++ -fsanitize=address,undefined -fno-omit-frame-pointer -frtti -stdlib=libc++"
      CFLAGS: "-g -O3 -Wall -pedantic"
      CXXFLAGS: "-g -O3 -Wall -pedantic"
      FC: gfortran
      FFLAGS: "-O2 -pedantic"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y libuv1-dev libc++-dev libc++abi-dev
      - name: Install dependencies from source
        run: |
          mkdir -p ~/.R
          echo "CC=$CC" >> ~/.R/Makevars
          echo "CXX=$CXX" >> ~/.R/Makevars
          echo "CFLAGS=$CFLAGS" >> ~/.R/Makevars
          echo "CXXFLAGS=$CXXFLAGS" >> ~/.R/Makevars
          echo "FC=$FC" >> ~/.R/Makevars
          echo "FFLAGS=$FFLAGS" >> ~/.R/Makevars
          Rscript -e 'install.packages("remotes", repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, type = "source")'
      - name: Build and Check
        run: |
          R CMD build .
          R CMD check bit64_*.tar.gz --as-cran --no-manual --no-vignettes

  valgrind:
    name: "Oxford Valgrind"
    runs-on: ubuntu-latest
    env:
      R_DONT_USE_TK: true
      RJAVA_JVM_STACK_WORKAROUND: 0
      # Oxford flags
      CFLAGS: "-g -O2 -Wall -pedantic -mtune=native"
      CXXFLAGS: "-g -O2 -Wall -pedantic -mtune=native"
      FFLAGS: "-g -O2 -mtune=native"
      FCFLAGS: "-g -O2 -mtune=native"
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y valgrind libuv1-dev
      - name: Install dependencies from source
        run: |
          mkdir -p ~/.R
          echo "CFLAGS=$CFLAGS" >> ~/.R/Makevars
          echo "CXXFLAGS=$CXXFLAGS" >> ~/.R/Makevars
          echo "FFLAGS=$FFLAGS" >> ~/.R/Makevars
          echo "FCFLAGS=$FCFLAGS" >> ~/.R/Makevars
          Rscript -e 'install.packages("remotes", repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, type = "source")'
      - name: Build and Check
        run: |
          R CMD build .
          echo '{
             Suppression for wcsrtombs
             Memcheck:Cond
             fun:__wcsnlen_sse4_1
             fun:wcsrtombs
             fun:wcstombs
          }
          {
             Suppression for do_makename
             Memcheck:Addr16
             fun:__wcsnlen_sse4_1
             fun:wcsrtombs
             fun:wcstombs
          }' > valgrind.supp
          R CMD check bit64_*.tar.gz --as-cran --no-manual --no-vignettes --use-valgrind --valgrind-args="--suppressions=valgrind.supp"

  test-ancient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '3.5.0'


      - name: Install bit64 and dependencies
        run: |
          Rscript -e 'options(repos = "https://cloud.r-project.org");  install.packages("bit")'
          R CMD INSTALL .
          cp .devcontainer/r-350/.Rprofile .

      - name: Run Tests
        shell: bash
        run: |
          EXIT_CODE=0
          for FILE in tests/testthat/test-*.R; do
            echo "----------------------------------------------------------------"
            echo "Running $FILE"

            sed -E "s/(patrick|withr):://g" "$FILE" > "${FILE}_SHIMMED.R"
            Rscript -e "library(methods); suppressWarnings(suppressMessages(library(bit64))); source('tests/testthat/helper.R'); source('${FILE}_SHIMMED.R')"
            rm "${FILE}_SHIMMED.R"

            # Capture failure
            if [ $? -ne 0 ]; then
              EXIT_CODE=1
            fi

          done

          exit $EXIT_CODE
