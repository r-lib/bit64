# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libuv1-dev
      - uses: r-lib/actions/setup-r-dependencies@v2
      - name: R CMD check with valgrind
        env:
          # halt_on_error forces an immediate crash. strict_string_checks helps catch global OOB reads.
          ASAN_OPTIONS: 'detect_leaks=0:detect_odr_violation=0:halt_on_error=1:strict_string_checks=1'
          UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
        run: |
          R CMD build .
          R CMD check --use-valgrind bit64_*.tar.gz

  test-sanitizers-only:
    runs-on: ubuntu-latest
    container:
      image: rocker/r-devel-san
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y libuv1-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE)'

      - name: Install Package and Run Tests (ASAN/UBSAN)
        env:
          ASAN_OPTIONS: 'detect_leaks=0:detect_odr_violation=0:halt_on_error=1:strict_string_checks=1'
          UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
        run: |
          # Install the package directly from source
          R CMD INSTALL .

          # Run tests directly
          Rscript -e 'library(testthat); library(patrick); test_local()'

  test-valgrind-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - name: Install Valgrind & Sys Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libuv1-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE)'

      - name: Install Package
        run: R CMD INSTALL .

      - name: Run Tests under Valgrind
        run: |
          # The --error-exitcode=1 ensures the GH Action fails if Valgrind finds a memory error
          R -d "valgrind --leak-check=full --track-origins=yes --error-exitcode=1" -e 'library(patrick); testthat::test_local()'

  test-ancient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '3.5.0'


      - name: Install bit64 and dependencies
        run: |
          Rscript -e 'options(repos = "https://cloud.r-project.org");  install.packages("bit")'
          R CMD INSTALL .
          cp .devcontainer/r-350/.Rprofile .

      - name: Run Tests
        shell: bash
        run: |
          EXIT_CODE=0
          for FILE in tests/testthat/test-*.R; do
            echo "----------------------------------------------------------------"
            echo "Running $FILE"

            sed -E "s/(patrick|withr):://g" "$FILE" > "${FILE}_SHIMMED.R"
            Rscript -e "library(methods); suppressWarnings(suppressMessages(library(bit64))); source('tests/testthat/helper.R'); source('${FILE}_SHIMMED.R')"
            rm "${FILE}_SHIMMED.R"

            # Capture failure
            if [ $? -ne 0 ]; then
              EXIT_CODE=1
            fi

          done

          exit $EXIT_CODE
